              rowCount += 1
              
              const rect = row.getBoundingClientRect()
              
              webkit.messageHandlers.app.postMessage({"event":"update-done", "callID": callID, "rect": [rect.x, rect.y, rect.width, rect.height]})
              
          }
          
      }
      
  </script>
</head>

<div id="render_rows" style="position:absolute;top:0;left:0;"></div>
</body>
